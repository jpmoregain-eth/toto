name: Daily 4D Update
on:
  schedule:
    - cron: "45 8 * * *"   # 2:45 PM SGT
    - cron: "00 9 * * *"   # 3:00 PM SGT
    - cron: "15 9 * * *"   # 3:15 PM SGT
    - cron: "30 9 * * *"   # 3:30 PM SGT
    - cron: "45 9 * * *"   # 3:45 PM SGT
  workflow_dispatch:
jobs:
  update-4d:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase python-dotenv
      - name: Run 4D daily update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python fourd_daily_update.py
