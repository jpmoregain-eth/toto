name: Daily TOTO Update
on:
  schedule:
    - cron: "45 7 * * *"   # 6:45 PM SGT
    - cron: "00 8 * * *"   # 7:00 PM SGT
    - cron: "15 8 * * *"   # 7:15 PM SGT
    - cron: "30 8 * * *"   # 7:30 PM SGT
    - cron: "45 8 * * *"   # 7:45 PM SGT
  workflow_dispatch:
jobs:
  update-toto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase python-dotenv
      - name: Run TOTO daily update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python daily_update.py
